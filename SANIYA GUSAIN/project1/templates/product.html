<!DOCTYPE html>
<html lang="en">

<head>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <meta charset="UTF-8">
    <title>🛍️ Product Explorer</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/product.css') }}">
</head>

<body>
    <a href="{{ url_for('apis') }}" class="back-btn">← Back</a>
    <div class="container">

        <h1>🛍️ Product Explorer</h1>

        <table>

            <thead>

                <tr>
                    <th>Image</th>
                    <th>Title</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Rating</th>
                </tr>

            </thead>

            <tbody>

                {% for product in products %}

                <tr>

                    <td>
                        <img src="{{ product.image }}" alt="{{ product.title }}">
                    </td>

                    <td>{{ product.title }}</td>

                    <td>{{ product.category }}</td>

                    <td>${{ product.price }}</td>

                    <td>
                        ⭐ {{ product.rating }}
                        <br>
                        ({{ product.count }} reviews)
                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</body>

</html>
