<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>IMDb Top Charts</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/topcharts.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <div class="container">

        <a href="{{ url_for('dynamicscraper') }}" class="back-btn">← Back</a>

        <h1> IMDb Top Charts 🎬</h1>

        <p class="subtitle">
            Dynamic Web Scraping using Selenium
        </p>

        <div class="table-box">

            <table>

                <thead>

                    <tr>
                        <th>Poster</th>
                        <th>Movie</th>
                        <th>Year</th>
                        <th>Runtime</th>
                        <th>Certificate</th>
                        <th>Rating</th>
                    </tr>

                </thead>

                <tbody>

                    {% for movie in movies %}

                    <tr>

                        <td>
                            <img src="{{ movie.poster }}" alt="Poster">
                        </td>

                        <td>{{ movie.title }}</td>

                        <td>{{ movie.year }}</td>

                        <td>{{ movie.runtime }}</td>

                        <td>{{ movie.certificate }}</td>

                        <td class="rating">
                            ⭐ {{ movie.rating }}
                        </td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</body>

</html>
