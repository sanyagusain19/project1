<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TechCrunch Startups</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/startups.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/cursor-trail.css') }}">
<script src="{{ url_for('static', filename='js/cursor-trail.js') }}"></script>
</head>

<body>

    <div class="container">

        <a href="{{ url_for('dynamicscraper') }}" class="back-btn">← Back</a>

        <h1>🚀 TechCrunch Startups</h1>

        <p class="subtitle">
            Dynamic Web Scraping using Selenium
        </p>

        <div class="table-box">

            <table>

                <thead>

                    <tr>
                        <th>Startup News</th>
                        <th>Author</th>
                    </tr>

                </thead>

                <tbody>

                    {% for startup in startups %}

                    <tr>

                        <td>{{ startup.title }}</td>

                        <td>{{ startup.author }}</td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</body>

</html>
