<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Spotify Top Songs</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/top_songs.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <div class="container">

        <a href="{{ url_for('dynamicscraper') }}" class="back-btn">← Back</a>

        <h1>🎵 Spotify Top Songs</h1>

        <p class="subtitle">
            Dynamic Web Scraping using Selenium
        </p>

        <div class="table-box">

            <table>

                <thead>

                    <tr>
                        <th>Song</th>
                        <th>Artist</th>
                    </tr>

                </thead>

                <tbody>

                    {% for song in songs %}

                    <tr>

                        <td>{{ song.title }}</td>

                        <td>{{ song.artist }}</td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</body>

</html>
